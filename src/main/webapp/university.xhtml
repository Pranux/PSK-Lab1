<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
<h:head>
    <title>Universities and Courses</title>
</h:head>
<h:body>
    <h1>Universities</h1>
    
    <h:dataTable value="#{universityController.universities}" var="uni"
                 border="1" cellpadding="5">
        <h:column>
            <f:facet name="header">ID</f:facet>
            #{uni.id}
        </h:column>
        <h:column>
            <f:facet name="header">Name</f:facet>
            #{uni.name}
        </h:column>
        <h:column>
            <f:facet name="header">City</f:facet>
            #{uni.city}
        </h:column>
        <h:column>
            <f:facet name="header">Courses (one-to-many)</f:facet>
            <ui:repeat value="#{uni.courses}" var="course">
                #{course.title} (#{course.credits} ECTS)<br/>
            </ui:repeat>
        </h:column>
    </h:dataTable>

    <br/>
    <h2>All Students and Their Courses (many-to-many)</h2>

    <h:dataTable value="#{universityController.students}" var="student"
                 border="1" cellpadding="5">
        <h:column>
            <f:facet name="header">Name</f:facet>
            #{student.firstName} #{student.lastName}
        </h:column>
        <h:column>
            <f:facet name="header">Email</f:facet>
            #{student.email}
        </h:column>
        <h:column>
            <f:facet name="header">Enrolled Courses (many-to-many)</f:facet>
            <ui:repeat value="#{student.courses}" var="c">
                #{c.title}<br/>
            </ui:repeat>
        </h:column>
    </h:dataTable>

    <br/>
    <h:link value="Add New Student" outcome="addStudent"/>
</h:body>
</html>
