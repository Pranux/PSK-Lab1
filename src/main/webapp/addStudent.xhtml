<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
  <title>Add Student</title>
</h:head>
<h:body>
  <h1>Add New Student</h1>
  
  <h:panelGroup rendered="#{not empty universityController.conflictMessage}">
    <p style="color:red;">#{universityController.conflictMessage}</p>
  </h:panelGroup>
  
  <h:form>
    <table>
      <tr>
        <td>First Name:</td>
        <td><h:inputText value="#{universityController.newStudent.firstName}" required="true"/></td>
      </tr>
      <tr>
        <td>Last Name:</td>
        <td><h:inputText value="#{universityController.newStudent.lastName}" required="true"/></td>
      </tr>
      <tr>
        <td>Email:</td>
        <td><h:inputText value="#{universityController.newStudent.email}"/></td>
      </tr>
      <tr>
        <td>Enroll in Course:</td>
        <td>
          <h:selectOneMenu value="#{universityController.selectedCourseId}">
            <f:selectItem itemLabel="-- Select --" itemValue=""/>
            <f:selectItems value="#{universityController.courses}" var="c"
                           itemLabel="#{c.title}" itemValue="#{c.id}"/>
          </h:selectOneMenu>
        </td>
      </tr>
    </table>
    <br/>
    <h:commandButton value="Save Student" action="#{universityController.addStudent}"/>
  </h:form>

  <br/>
  <h:link value="Back to list" outcome="universities"/>
</h:body>
</html>
